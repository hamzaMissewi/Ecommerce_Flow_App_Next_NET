services:
  db:
    image: postgres:17
    container_name: ecommerce-db
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_dev_pw
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - ecommerce-pgdata:/var/lib/postgresql/data

volumes:
  ecommerce-pgdata:
